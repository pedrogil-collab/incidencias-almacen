<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Registro de Incidencias</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        :root{--bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:#2a2f3f;--accent:#f0c040;--accent2:#e05a3a;--text:#eef0f6;--muted:#6b7280;--success:#34d399;--radius:12px;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;}
        .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
        .header-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
        .header-text h1{font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
        .header-text span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
        .main{padding:18px 16px 60px;max-width:520px;margin:0 auto;}
        .datetime-chip{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right;margin-bottom:16px;}
        .datetime-chip span{color:var(--accent);}
        .config-banner{background:#1a1200;border:1px solid #5a4000;border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;font-size:12px;color:#f0c040cc;line-height:1.7;}
        .config-banner.ok{background:#0a1a0a;border-color:#1a5a3a;color:var(--success);}
        .config-banner strong{display:block;margin-bottom:4px;font-size:13px;}
        .config-banner input{width:100%;margin-top:8px;background:#0d0f14;border:1px solid #5a4000;border-radius:6px;padding:9px 12px;color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;outline:none;}
        .step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;position:relative;}
        .step-card.done{border-color:var(--success);}
        .step-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
        .step-num{width:24px;height:24px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
        .step-card.done .step-num{background:var(--success);color:#000;}
        label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;}
        input[type="text"],select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px 14px;outline:none;}
        .scanner-box{border-radius:10px;overflow:hidden;background:#000;aspect-ratio:4/3;display:none;margin-bottom:10px;position:relative;}
        .scanner-box.active{display:block;}
        #scanner-container{width:100%;height:100%;}
        #scanner-container video{width:100%;height:100%;object-fit:cover;}
        .sscc-result{margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'DM Mono',monospace;}
        .photo-preview{width:100%;border-radius:10px;overflow:hidden;display:none;position:relative;margin-bottom:10px;}
        .photo-preview.active{display:block;}
        .photo-preview img{width:100%;display:block;}
        .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:8px;border:none;font-weight:700;text-transform:uppercase;cursor:pointer;}
        .btn-scan{background:var(--accent2);color:#fff;}
        .btn-photo{background:var(--surface2);border:2px dashed var(--border);color:var(--muted);flex-direction:column;padding:20px;}
        .btn-submit{background:var(--accent);color:#000;font-size:15px;padding:16px;margin-top:20px;}
        .btn-submit:disabled{opacity:.3;}
        .status-msg{display:none;margin-top:14px;padding:12px;border-radius:8px;font-size:13px;text-align:center;}
        .status-msg.uploading{display:block;background:#1a1200;color:var(--accent);}
        .status-msg.success{display:block;background:#0a2a1a;color:var(--success);}
        .status-msg.error{display:block;background:#2a0a0a;color:#f87171;}
        input[type="file"]{display:none;}
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">⚠️</div>
    <div class="header-text">
        <h1>Registro de Incidencias</h1>
        <span>Control de Descarga · Almacén</span>
    </div>
</div>

<div class="main">
    <div class="datetime-chip" id="clock">—</div>

    <div class="config-banner" id="configBanner">
        <strong>⚙️ Configuración</strong>
        <input type="text" id="scriptUrl" placeholder="URL de Apps Script" />
        <button class="btn" style="background:var(--accent);color:000;margin-top:8px;" onclick="saveConfig()">Guardar</button>
    </div>

    <div class="step-card" id="card1">
        <div class="step-header"><div class="step-num">1</div><label>Operario</label></div>
        <select id="operario" onchange="checkSteps()"><option value="">Cargando...</option></select>
    </div>

    <div class="step-card" id="card2">
        <div class="step-header"><div class="step-num">2</div><label>Incidencia</label></div>
        <select id="tipoIncidencia" onchange="checkSteps()"><option value="">Cargando...</option></select>
    </div>

    <div class="step-card" id="card3">
        <div class="step-header"><div class="step-num">3</div><label>Código SSCC</label></div>
        <button class="btn btn-scan" id="btnScan" onclick="toggleScanner()">📷 Escanear Código</button>
        <div class="scanner-box" id="scannerBox"><div id="scanner-container"></div></div>
        <div class="sscc-result" id="ssccDisplay">Sin escanear</div>
    </div>

    <div class="step-card" id="card4">
        <div class="step-header"><div class="step-num">4</div><label>Fotografía</label></div>
        <div class="photo-preview" id="photoPreview"><img id="photoImg" src=""><button onclick="removePhoto()" style="position:absolute;top:5px;right:5px;background:red;color:white;border:none;border-radius:50%;width:25px;height:25px;">X</button></div>
        <button class="btn btn-photo" id="btnPhoto" onclick="triggerCamera()">📸 Tomar Foto</button>
        <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(event)" />
    </div>

    <button class="btn btn-submit" id="btnSubmit" onclick="submitIncidencia()" disabled>🚀 Registrar Incidencia</button>
    <div class="status-msg" id="statusMsg"></div>
</div>

<script>
    var SCRIPT_URL = localStorage.getItem('scriptUrl') || '';
    var ssccValue = '', photoBlob = null, scannerRunning = false;

    function updateClock(){
        var now = new Date();
        document.getElementById('clock').innerHTML = now.toLocaleDateString() + ' · <span>' + now.toLocaleTimeString() + '</span>';
    }
    setInterval(updateClock, 1000);

    window.onload = function(){
        if(SCRIPT_URL){
            document.getElementById('scriptUrl').value = SCRIPT_URL;
            document.getElementById('configBanner').style.display = 'none';
            cargarDatos();
        }
    };

    function saveConfig(){
        var val = document.getElementById('scriptUrl').value.trim();
        if(val){ SCRIPT_URL = val; localStorage.setItem('scriptUrl', val); location.reload(); }
    }

    async function jsonp(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_' + Date.now();
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = () => reject(new Error('Error de red'));
            document.body.appendChild(script);
        });
    }

    function cargarDatos(){
        jsonp(SCRIPT_URL + '?action=getOperarios').then(d => {
            let s = document.getElementById('operario');
            s.innerHTML = '<option value="">— Seleccionar —</option>';
            d.valores.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`);
        });
        jsonp(SCRIPT_URL + '?action=getIncidencias').then(d => {
            let s = document.getElementById('tipoIncidencia');
            s.innerHTML = '<option value="">— Seleccionar —</option>';
            d.valores.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`);
        });
    }

    function checkSteps(){
        const op = document.getElementById('operario').value;
        const ti = document.getElementById('tipoIncidencia').value;
        document.getElementById('btnSubmit').disabled = !(op && ti && ssccValue);
    }

    function toggleScanner(){
        if(scannerRunning){ Quagga.stop(); document.getElementById('scannerBox').classList.remove('active'); }
        else {
            document.getElementById('scannerBox').classList.add('active');
            Quagga.init({
                inputStream: { type: "LiveStream", target: document.querySelector('#scanner-container'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["code_128_reader", "ean_reader"] }
            }, (err) => { if(!err) Quagga.start(); });
            Quagga.onDetected(data => {
                ssccValue = data.codeResult.code;
                document.getElementById('ssccDisplay').innerText = ssccValue;
                toggleScanner();
                checkSteps();
            });
        }
        scannerRunning = !scannerRunning;
    }

    function triggerCamera(){ document.getElementById('photoInput').click(); }
    function handlePhoto(e){
        photoBlob = e.target.files[0];
        document.getElementById('photoImg').src = URL.createObjectURL(photoBlob);
        document.getElementById('photoPreview').classList.add('active');
        document.getElementById('btnPhoto').style.display = 'none';
    }
    function removePhoto(){
        photoBlob = null;
        document.getElementById('photoPreview').classList.remove('active');
        document.getElementById('btnPhoto').style.display = 'flex';
    }

    async function compressImage(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1000;
                    let w = img.width, h = img.height;
                    if (w > h && w > max) { h *= max / w; w = max; }
                    else if (h > max) { w *= max / h; h = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
            };
        });
    }

    async function submitIncidencia(){
        const status = document.getElementById('statusMsg');
        status.className = 'status-msg uploading';
        status.innerText = 'Registrando datos...';
        document.getElementById('btnSubmit').disabled = true;

        const now = new Date();
        const folder = `Incidencias Almacen/${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
        
        try {
            // 1. Registrar en Sheets
            const regUrl = SCRIPT_URL + `?action=registrar&fecha=${encodeURIComponent(now.toLocaleDateString())}&hora=${encodeURIComponent(now.toLocaleTimeString())}&operario=${encodeURIComponent(document.getElementById('operario').value)}&tipo=${encodeURIComponent(document.getElementById('tipoIncidencia').value)}&sscc=${encodeURIComponent(ssccValue)}&timestamp=${encodeURIComponent(now.toISOString())}`;
            const regRes = await jsonp(regUrl);
            
            // 2. Subir Foto (POST)
            if(photoBlob && regRes.ok){
                status.innerText = 'Subiendo fotografía...';
                const base64 = await compressImage(photoBlob);
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'uploadFoto',
                        base64: base64,
                        filename: `${ssccValue}_${Date.now()}.jpg`,
                        folderPath: folder,
                        rowIndex: regRes.rowIndex
                    })
                });
            }

            status.className = 'status-msg success';
            status.innerText = '✅ ¡Registrado con éxito!';
            setTimeout(() => location.reload(), 2000);

        } catch (e) {
            status.className = 'status-msg error';
            status.innerText = '❌ Error: ' + e.message;
            document.getElementById('btnSubmit').disabled = false;
        }
    }
</script>
</body>
</html>
